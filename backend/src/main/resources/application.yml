server:
  port: 8085
spring:
  datasource:
    url: jdbc:h2:file:./data/chatdb;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update  # dev only — use validate/none + migrations in prod
    show-sql: false
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:admin123}
      timeout: 2000ms
  h2:
    console:
      enabled: true
      path: /h2-console
openai:
  api-base: ${OPENAI_API_BASE:https://apim-maya-gpt-fnt-dev.azure-api.net/}
  api-key: ${OPENAI_API_KEY:f1b45e89bb97442fa34258c2310fac10}
  api-version: ${OPENAI_API_VERSION:2025-01-01-preview}
  chat-model: ${OPENAI_CHAT_MODEL:gpt-4o}
  temperature: ${GPT_TEMPERATURE:0.7}
  top-p: ${GPT_TOP_P:0.95}
  max-tokens: ${GPT_MAX_TOKENS:3500}
chat:
  search-timeout-seconds: 30
  history:
    redis-ttl-seconds: 1800
    redis-max-entries: 50
    default-limit: 20
    max-limit: 50
  stream:
    redis-ttl-seconds: 300
  rate-limit:
    per-user-per-minute: 15
    active-stream-lock-seconds: 60
  chunks:
    ttl-seconds: ${CHAT_CHUNKS_TTL_SECONDS:3600}
  regenerate:
    temperature: ${CHAT_REGENERATE_TEMPERATURE:0.7}
logging:
  level:
    com.example.chat: INFO

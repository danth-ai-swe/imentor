server:
  port: 8085
spring:
  datasource:
    url: jdbc:h2:file:./data/chatdb;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update  # dev only — use validate/none + migrations in prod
    show-sql: false
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
  h2:
    console:
      enabled: true
      path: /h2-console
openai:
  api-base: ${OPENAI_API_BASE:https://api.openai.com}
  api-key: ${OPENAI_API_KEY:}
  api-version: ${OPENAI_API_VERSION:}
  chat-model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
  temperature: ${GPT_TEMPERATURE:0.7}
  top-p: ${GPT_TOP_P:0.95}
  max-tokens: ${GPT_MAX_TOKENS:3500}
chat:
  search-timeout-seconds: 30
logging:
  level:
    com.example.chat: INFO

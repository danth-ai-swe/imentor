server:
  port: 8080
spring:
  datasource:
    url: jdbc:h2:file:./data/chatdb;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  h2:
    console:
      enabled: true
      path: /h2-console
openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: https://api.openai.com
  model: gpt-4o-mini
chat:
  search-timeout-seconds: 30
logging:
  level:
    com.example.chat: INFO
